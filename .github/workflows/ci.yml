name: CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check HTML files exist
        run: |
          if [ ! -f index.html ]; then
            echo "index.html not found!"
            exit 1
          fi
          echo "Portfolio structure looks good."

      - name: List project files
        run: ls -R